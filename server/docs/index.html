<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>API 文档 - Koa App Template</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Koa App Template API 文档" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <!-- 主题样式（本地） -->
    <link rel="stylesheet" href="assets/css/vue.css" />
    <style>
      :root {
        --theme-color: #42b983;
      }
      .markdown-section h1 {
        margin-top: 0;
      }
      .markdown-section table {
        display: table;
        width: 100%;
      }
      .markdown-section code {
        background-color: #f6f8fa;
        padding: 2px 6px;
        border-radius: 4px;
      }
      /* HTTP 方法颜色 */
      .markdown-section h3 code {
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app">加载中...</div>
    <script>
      window.$docsify = {
        name: 'API 文档',
        repo: '',
        loadSidebar: true,
        subMaxLevel: 3,
        search: {
          placeholder: '搜索接口...',
          noData: '未找到结果',
          paths: 'auto'
        },
        // 自动生成标题
        autoHeader: true,
        // 显示更新时间
        formatUpdated: '{YYYY}-{MM}-{DD} {HH}:{mm}',
        // 404 页面
        notFoundPage: true
      }
    </script>
    <!-- Docsify 核心（本地） -->
    <script src="assets/js/docsify.min.js"></script>
    <!-- 搜索插件 -->
    <script src="assets/js/search.min.js"></script>
    <!-- 代码高亮 -->
    <script src="assets/js/prism-json.min.js"></script>
    <script src="assets/js/prism-bash.min.js"></script>
    <!-- 复制代码 -->
    <script src="assets/js/docsify-copy-code.min.js"></script>
  </body>
</html>
