worker_processes  1; #全局块
 
events {
    worker_connections  1024;
}

http {
    upstream cms-server-node {
        server cms-server-node:8080;
    }

    upstream cms-frontend-manage {
        server cms-frontend-manage:80;
    }

    upstream cms-frontend-web {
        server cms-frontend-web:80;
    }
    server {
        listen 80;
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        sendfile on;
        keepalive_timeout 65;

        location /api/ {
            proxy_pass http://cms-server-node;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
             # 去掉 /api 前缀
            rewrite ^/api/(.*)$ /$1 break;
        }


        location /admin {
            proxy_pass http://cms-frontend-manage/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        location / {
            proxy_pass http://cms-frontend-web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
