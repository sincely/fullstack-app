name: Release

on:
  # 当main, master分支有新push时，执行以下操作
  # push:
  #   branches: [main, master]
  workflow_dispatch:
    inputs:
      version-type:
        description: 'Version type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - alpha
          - beta

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '8.15.7'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "!contains(github.event.head_commit.message, 'chore:')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 重要：需要获取完整的历史记录和权限
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install client dependencies
        run: pnpm -C client install --no-frozen-lockfile

      - name: Install server dependencies
        run: pnpm -C server install --no-frozen-lockfile

      - name: Build client
        run: pnpm -C client run build:prod

      - name: Build server
        run: pnpm -C server run build

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            pnpm exec release-it ${{ github.event.inputs.version-type }} --ci
          else
            pnpm exec release-it --ci
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            client/dist/
            server/dist/
            CHANGELOG.md
            server/CHANGELOG.md
          retention-days: 7
